<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>南商老饕-極速版 v9.0</title>
  <style>
    :root { --primary: #e67e22; --secondary: #d35400; --bg: #fdf6e3; --white: #ffffff; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0; font-family: "Microsoft JhengHei", sans-serif;
      background-color: var(--bg); text-align: center; padding: 20px;
    }
    .status-bar { color: #7f8c8d; font-size: 14px; margin-bottom: 20px; background: white; padding: 10px 20px; border-radius: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    
    .filter-section { margin-bottom: 15px; width: 100%; max-width: 400px; }
    select { width: 100%; padding: 12px; font-size: 16px; border-radius: 15px; border: 2px solid var(--primary); outline: none; background: white; }

    .menu { width: 100%; max-width: 400px; }
    button { padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 50px; border: 2px solid var(--primary); background: white; color: var(--primary); transition: 0.2s; }
    .btn-main { background: var(--primary); color: white; border: none; width: 100%; font-size: 22px; margin-bottom: 10px; }

    #result-box {
      margin-top: 25px; padding: 20px; width: 90%; max-width: 400px;
      border: 3px dashed var(--primary); border-radius: 20px; background: white;
      display: none; animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .result-name { font-size: 28px; color: #c0392b; font-weight: bold; margin-bottom: 15px; }

    /* 推薦資訊彈窗 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 99; }
    #food-modal {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 80%; max-width: 350px; background: white; border-radius: 20px; z-index: 100; padding: 25px; text-align: left;
    }
    .modal-title { font-size: 22px; color: var(--secondary); font-weight: bold; text-align: center; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    
    .sub-btn { width: 100%; margin-top: 10px; border-radius: 50px; padding: 12px; border: none; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
    .btn-info { background: #fd79a8; }
    .btn-bus { background: #2ecc71; }
  </style>
</head>
<body>

  <h1>南商老饕 🍔 隨機食</h1>
  <div class="status-bar">🕒 現在時間：<span id="time-info">--:--</span></div>

  <div class="filter-section">
    <select id="category">
      <option value="全部">🍱 全部分類 (限營業中)</option>
      <option value="早餐">☀️ 找早餐</option>
      <option value="正餐">🍚 找正餐/晚餐</option>
      <option value="小吃">🥨 找小吃/點心</option>
      <option value="飲料">🧋 找飲料</option>
    </select>
  </div>

  <div class="menu">
    <button class="btn-main" onclick="startLottery()">🎲 抽籤決定！</button>
  </div>

  <div id="result-box">
    <div id="food-result" class="result-name"></div>
    <button class="sub-btn btn-info" onclick="showFoodInfo()">😋 看推薦菜單</button>
    <button class="sub-btn btn-bus" id="bus-btn">🚌 怎麼搭公車最快？</button>
  </div>

  <div class="modal-overlay" id="overlay" onclick="closeModal()"></div>
  <div id="food-modal">
    <div id="modal-title" class="modal-title"></div>
    <div style="font-weight: bold; color: #e67e22; margin-bottom: 8px;">🍴 必點推薦：</div>
    <div id="modal-rec" style="margin-bottom: 25px; line-height: 1.6; font-size: 18px; color: #333;"></div>
    <button style="width:100%; padding:12px; border:none; border-radius:50px; cursor:pointer; background:#eee; font-weight:bold;" onclick="closeModal()">關閉視窗</button>
  </div>

  <script>
    const foodDB = [
      { name: "高家中西式早餐", type: "早餐", start: 5.5, end: 11, off: [], rec: "蛋餅、蘿蔔糕、奶茶" },
      { name: "少爺手作蛋餅", type: "早餐", start: 6, end: 13, off: [1], rec: "綜合蛋餅、流沙蛋餅" },
      { name: "阿公阿婆蛋餅", type: "早餐", start: 5.5, end: 12.5, off: [], rec: "粉漿蛋餅（份量驚人！）" },
      { name: "阿杰手工蛋餅", type: "早餐", start: 6, end: 13.5, off: [1], rec: "打拋豬蛋餅、起司拔絲餅" },
      { name: "豆奶宗", type: "早餐/宵夜", start: 22, end: 34, off: [], rec: "沙茶蛋餅、刈包、鮮奶茶" },
      { name: "勝利早點", type: "早餐/宵夜", start: 17, end: 34, off: [], rec: "豬肉沙拉蛋餅、蔥餅" },
      { name: "吐司吐司早餐", type: "早餐", start: 6, end: 13, off: [0], rec: "薯泥起司蛋餅（必點招牌）" },
      { name: "億哥牛肉湯", type: "正餐", start: 0, end: 24, off: [], rec: "牛肉湯、牛肉燥飯" },
      { name: "五妃廟豆腐冰", type: "小吃", start: 10.5, end: 22, off: [], rec: "抹茶豆腐冰、杏仁豆腐" },
      { name: "甜又鮮飲料", type: "飲料", start: 9, end: 22, off: [], rec: "噴射梅子綠、噴射冬瓜" },
      { name: "藥師的私房紅茶", type: "飲料", start: 11, end: 22, off: [4], rec: "老樹紅茶、藥師奶茶" },
      { name: "阿龍意麵", type: "正餐", start: 10.5, end: 21, off: [2], rec: "牛蒡意麵、各式滷味" },
      { name: "保哥黑輪", type: "正餐/小吃", start: 11, end: 21, off: [4], rec: "炒泡麵、黑輪" },
      { name: "矮仔成蝦仁飯", type: "正餐", start: 8, end: 19, off: [], rec: "蝦仁飯、鴨蛋湯" },
      { name: "友愛街鹹酥雞", type: "小吃", start: 14, end: 23.5, off: [2], rec: "三角骨、鹹酥雞" },
      { name: "醇涎坊鍋燒意麵", type: "正餐", start: 6, end: 20, off: [], rec: "鍋燒意麵、炸魚塊" }
    ];

    let selected = null;

    function updateTime() {
      const now = new Date();
      document.getElementById('time-info').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }
    setInterval(updateTime, 1000); updateTime();

    function startLottery() {
      const now = new Date();
      const hour = now.getHours() + (now.getMinutes()/60);
      const day = now.getDay();
      const cat = document.getElementById("category").value;
      
      const available = foodDB.filter(f => {
        if (cat !== "全部" && !f.type.includes(cat)) return false;
        if (f.off.includes(day)) return false;
        let isOpen = (f.start < f.end) ? (hour >= f.start && hour < f.end) : (hour >= f.start || hour < f.end);
        if (f.end > 24 && hour < 11) isOpen = (hour + 24 >= f.start && hour + 24 < f.end);
        return isOpen;
      });

      if (available.length > 0) {
        selected = available[Math.floor(Math.random() * available.length)];
        document.getElementById("result-box").style.display = "block";
        document.getElementById("food-result").innerText = selected.name;
        document.getElementById("bus-btn").onclick = () => {
          window.open(`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(selected.name + " 台南")}&travelmode=transit`);
        };
      } else {
        alert("目前該分類沒有營業中的店家喔！");
      }
    }

    function showFoodInfo() {
      if (!selected) return;
      document.getElementById("modal-title").innerText = selected.name;
      document.getElementById("modal-rec").innerText = selected.rec;
      document.getElementById("overlay").style.display = "block";
      document.getElementById("food-modal").style.display = "block";
    }

    function closeModal() {
      document.getElementById("overlay").style.display = "none";
      document.getElementById("food-modal").style.display = "none";
    }
  </script>
</body>
</html>
